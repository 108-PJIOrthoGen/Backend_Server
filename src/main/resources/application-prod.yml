# =============================================================================
# Prod profile — production overrides.
# Activated by SPRING_PROFILES_ACTIVE=prod (set in Infras_Devops/docker/docker-compose.yml).
#
# Every secret comes from env. There are NO fallback defaults — the app fails
# fast at startup if anything is missing, which is the desired behaviour.
# =============================================================================
spring:
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

secure:
  cookie:
    secure: true
    same-site: Lax

# Production Swagger off — don't expose API surface publicly
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Production health endpoint — never leak internal component status
management:
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    com.vietnam.pji: INFO
    org.springframework: WARN
    org.hibernate.SQL: WARN

openapi:
  service:
    serverUrl: https://108pog.site
    serverName: Production
