ai:
  service:
    base-url: ${AI_SERVICE_URL:http://localhost:8000}
    connect-timeout: ${AI_SERVICE_CONNECT_TIMEOUT:3000}
    read-timeout: ${AI_SERVICE_READ_TIMEOUT:180000}
    api-key: ${AI_SERVICE_API_KEY:dev-shared-key-pji-2026}

# Rate limiting — Bucket4j + Redis (Jedis) backend
# Rules are matched in order; the first matching rule applies. Place the most
# specific patterns first and a /api/v1/** catch-all last.
rate-limit:
  enabled: ${RATE_LIMIT_ENABLED:true}
  rules:
    # Auth — tight per-IP limit to deter brute-force on login/refresh
    - name: auth
      paths:
        - /api/v1/auth/login
        - /api/v1/auth/refresh
        - /api/v1/auth/forgot-password
        - /api/v1/auth/reset-password
      capacity: 5
      refill-tokens: 5
      refill-period: 1m
      per-user: false
    # Expensive AI calls (recommendation generation, chat) — moderate per-user
    - name: ai-expensive
      paths:
        - /api/v1/**/ai-recommendations/**
        - /api/v1/ai-recommendations/**
        - /api/v1/**/ai-chat/**
        - /api/v1/ai-chat/**
      capacity: 30
      refill-tokens: 30
      refill-period: 1m
      per-user: true
    # Catch-all generous default for the rest of the API
    - name: default
      paths:
        - /api/v1/**
      capacity: 200
      refill-tokens: 200
      refill-period: 1m
      per-user: true

extract-images:
  base-url: ${EXTRACT_IMAGES_URL:http://localhost:8002}
  connect-timeout: ${EXTRACT_IMAGES_CONNECT_TIMEOUT:3000}
  read-timeout: ${EXTRACT_IMAGES_READ_TIMEOUT:30000}

server:
  port: 8085

# Actuator — expose health, metrics, prometheus endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  tracing:
    enabled: ${OTEL_TRACING_ENABLED:true}
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
