# =============================================================================
# Dev profile — local development overrides.
# Activated by SPRING_PROFILES_ACTIVE=dev (also the default per application.yaml).
#
# Defaults here assume:
#   - Backing services running via Infras_Devops/docker-buildlocal.yml
#   - override sensitive values (mail password, AI keys) via VS Code launch.json env or an .env file you do NOT commit.
# =============================================================================
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/pji_dev}
    username: ${SPRING_DATASOURCE_USERNAME:user}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:admin2026}

# Make local upload/download point at the local MinIO container directly
integration:
  minio:
    url: ${INTEGRATION_MINIO_URL:http://localhost:9000}
    public-url: ${INTEGRATION_MINIO_PUBLIC_URL:http://localhost:9000}
    access-key: ${INTEGRATION_MINIO_ACCESS_KEY:admin}
    secret-key: ${INTEGRATION_MINIO_SECRET_KEY:admin2026}

secure:
  cookie:
    secure: false
  jwt:
    # Dev-only default. Override in prod via env. Safe to commit because it's
    # only used when SPRING_PROFILES_ACTIVE=dev.
    base64-secret: ${JWT_BASE64_SECRET:Thm2YoflXUlz108mmwLd3NA/wAVy6+USFlIoGoPuk88ac9IXLDfov3be8bryQlVQZ2V1RhKzY36mogSUiNEULg==}

app:
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4173,http://localhost:5173}

ai:
  service:
    base-url: ${AI_SERVICE_URL:http://localhost:8000}

extract-images:
  base-url: ${EXTRACT_IMAGES_URL:http://localhost:8002}

# Swagger ON in dev, OFF in prod
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

management:
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false   # avoid SMTP probe failing dev startup

logging:
  level:
    com.vietnam.pji: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
